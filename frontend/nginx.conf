server {
  listen 80;

  # Static frontend files (html, css, js, manifest, icons)
  root /usr/share/nginx/html;
  index index.html;

  # API routes are proxied to the backend container so the browser sees everything
  # as same-origin — no CORS configuration needed on the backend, and this proxy
  # pattern carries over unchanged when this moves to the Raspberry Pi later.
  location /auth {
    proxy_pass http://backend:3000;
  }

  location /scan {
    proxy_pass http://backend:3000;
  }

  location /bills {
    proxy_pass http://backend:3000;
  }

  location /products {
    proxy_pass http://backend:3000;
  }

  location /health {
    proxy_pass http://backend:3000/health;
  }

  location / {
    try_files $uri $uri/ /index.html;
  }
}
