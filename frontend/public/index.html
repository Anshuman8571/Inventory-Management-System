<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>Stock Inventory</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.css" integrity="sha512-cyzxRvewl+FOKTtp/VUW/3a0Fw+X2vYp+b4H9XwU43X4mD8Y4K3T5B7fE2zKkU+UoR9m6kM22rB2iP4gU8K/w==" crossorigin="anonymous" referrerpolicy="no-referrer" />
  <link rel="stylesheet" href="src/styles.css" />
</head>
<body>
  <div class="screen">
    <div class="card">
      <h1 class="title">Stock Inventory</h1>

      <form id="login-form">
        <label for="username">Username</label>
        <input type="text" id="username" name="username" autocomplete="username" required />

        <label for="password">Password</label>
        <input type="password" id="password" name="password" autocomplete="current-password" required />

        <p id="login-error" class="error-text"></p>

        <button type="submit" class="btn-primary">Log In</button>
      </form>
    </div>
  </div>

  <script src="src/api.js"></script>
  <script src="src/offline.js"></script>
  <script src="src/nav.js"></script>
  <script src="src/camera.js"></script>
  <script src="src/categorySelect.js"></script>
  <script src="src/confirmCard.js"></script>
  <script src="src/scan.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.js" integrity="sha512-B62F0iS8iYw+O9f8m/aV+hYJ4n8f8eNnI9wX4a7d+uM8o9+8d2O9Y4Q8F1B+Z0f3vX/Zz2X8+G0G3g9U0O7N/w==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
  <script src="src/crop.js"></script>
  <script src="src/billFlow.js"></script>
  <script src="src/home.js"></script>
  <script src="src/dashboard.js"></script>
  <script src="src/reportsView.js"></script>
  <script src="src/auth.js"></script>
</body>
</html>
